<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>My Bag</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->

<header class="navbar">
<a href="index.html" class="logo">PLAYARENA</a>

<div class="search">
<input type="text" placeholder="Search sets, themes, and more">
</div>

<div class="icons">
<a id="accountIcon" href="login.html">👤</a>
<span>♡</span>
<a href="cart.html" class="cart-icon">
🛒
<span class="cart-count">0</span>
</a>
</div>
</header>


<!-- CART PAGE -->

<section class="cart-page">

<h1>My Bag (0)</h1>

<div class="cart-layout">

<!-- LEFT SIDE -->

<div class="cart-items"></div>




<!-- RIGHT SIDE -->

<div class="order-summary">

<h3>Order Summary</h3>

<div class="summary-row">
<span class="subtotal-items">Subtotal (0 items)</span>
<span class="subtotal-price">$0</span>
</div>

<div class="summary-row">
<span>Estimated Shipping</span>
<span class="shipping">FREE</span>
</div>

<div class="summary-row">
<span>Estimated Tax</span>
<span class="tax">$0</span>
</div>

<hr>

<div class="summary-row total">
<span>Total</span>
<span class="total-price">$0</span>
</div>

<button class="checkout">Checkout Securely</button>

<button class="paypal">Pay with PayPal</button>

</div>

</div>

</section>


<!-- RECOMMENDED -->

<section class="recommended">

<h2>Recommended For You</h2>

<div class="product-grid">

<div class="product-card">
<img src="images/mario.jpg">
<h4>Mario Kart™ Luigi</h4>
<p>$179.99</p>
<button>Add to Bag</button>
</div>

<div class="product-card">
<img src="images/zelda.jpg">
<h4>Zelda Final Battle</h4>
<p>$159.99</p>
<button>Add to Bag</button>
</div>

<div class="product-card">
<img src="images/sunflower.jpg">
<h4>Sunflower Bouquet</h4>
<p>$14.99</p>
<button>Add to Bag</button>
</div>

</div>

</section>


<footer class="footer">
<p>© PLAYARENA</p>
</footer>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

const container = document.querySelector(".cart-items");
const totalPrice = document.querySelector(".total-price");
const subtotalPrice = document.querySelector(".subtotal-price");
const subtotalItems = document.querySelector(".subtotal-items");
const cartTitle = document.querySelector(".cart-page h1");
const cartBadge = document.querySelector(".cart-count");


/* RENDER CART */

function renderCart() {
    const cartItemsContainer = document.querySelector(".cart-items");
    let cart = JSON.parse(localStorage.getItem("cart") || "[]");
    
    if(cart.length === 0) {
        cartItemsContainer.innerHTML = "<p>Giỏ hàng trống</p>";
        return;
    }

    cartItemsContainer.innerHTML = cart.map(item => `
        <div class="cart-item">
            <img src="${item.img || 'images/default.jpg'}" width="80">
            <div>
                <h4>${item.name}</h4>
                <p>$${item.price}</p>
            </div>
            <button onclick="removeItem(${item.id})">Xóa</button>
        </div>
    `).join('');
    updateTotal(); // Gọi hàm tính tổng tiền của bạn
}


/* CHANGE QTY */

function changeQty(id,delta){

const item = cart.find(p=>p.id===id);

if(!item) return;

item.qty += delta;

if(item.qty <=0){

cart = cart.filter(p=>p.id!==id);

}

saveCart();
renderCart();

}


/* REMOVE ITEM */

function removeItem(id){

cart = cart.filter(p=>p.id!==id);

saveCart();
renderCart();

}


/* SAVE */

function saveCart(){

localStorage.setItem("cart",JSON.stringify(cart));

}


const TAX_RATE = 0.08;
const SHIPPING_THRESHOLD = 100;
const SHIPPING_COST = 10;

function updateTotal(){

let subtotal = 0;
let count = 0;

cart.forEach(p=>{
subtotal += p.price * p.qty;
count += p.qty;
});

let tax = subtotal * TAX_RATE;

let shipping = subtotal > SHIPPING_THRESHOLD ? 0 : SHIPPING_COST;

let total = subtotal + tax + shipping;

/* UPDATE UI */

subtotalPrice.innerText = "$" + subtotal.toFixed(2);
subtotalItems.innerText = "Subtotal (" + count + " items)";

document.querySelector(".tax").innerText =
"$" + tax.toFixed(2);

document.querySelector(".shipping").innerText =
shipping === 0 ? "FREE" : "$" + shipping;

totalPrice.innerText = "$" + total.toFixed(2);

cartTitle.innerText = "My Bag (" + count + ")";

}


/* CART BADGE */

function updateCartCount(){

const total = cart.reduce((sum,item)=>sum+item.qty,0);

if(cartBadge) cartBadge.innerText = total;

}


/* LOAD */

renderCart();
updateCartCount();

</script>

<script>

const token = localStorage.getItem("token")

if(token){

const icon=document.getElementById("accountIcon")

if(icon){

icon.href="profile.html"

}

}

</script>

</body>
</html>
