<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Orders — PLAYARENA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>body { font-family: "Spline Sans", sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
  <header class="bg-white border-b border-slate-200 sticky top-0 z-10">
    <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="index.html" class="font-black text-lg text-slate-900">PLAYARENA</a>
      <div class="flex gap-4 text-sm font-semibold">
        <a href="profile.html" class="text-slate-600 hover:text-orange-500">Account</a>
        <a href="cart.html" class="text-slate-600 hover:text-orange-500">Cart</a>
      </div>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-black mb-2">My Orders</h1>
    <p class="text-sm text-slate-500 mb-6">Click an order number to view item details and totals.</p>

    <div id="loading" class="text-slate-500 text-sm">Loading...</div>
    <div id="empty" class="hidden bg-white rounded-2xl border border-dashed border-slate-200 p-10 text-center">
      <p class="text-slate-600 mb-4">You have no orders yet.</p>
      <a href="products.html" class="inline-block bg-orange-500 text-white font-bold px-6 py-3 rounded-xl hover:bg-orange-600">Shop Now</a>
    </div>
    <div id="tableWrap" class="hidden overflow-x-auto rounded-2xl border border-slate-200 bg-white shadow-sm">
      <table class="w-full text-sm text-left">
        <thead class="text-xs uppercase text-slate-500 bg-slate-50">
          <tr>
            <th class="px-4 py-3">Order #</th>
            <th class="px-4 py-3">Date</th>
            <th class="px-4 py-3">Status</th>
            <th class="px-4 py-3 text-right">Total</th>
          </tr>
        </thead>
        <tbody id="orderRows" class="divide-y divide-slate-100"></tbody>
      </table>
    </div>
  </main>

  <script>
    const API_BASE = "http://localhost:3000";

    function authHeaders() {
      return {
        "Content-Type": "application/json",
        Authorization: "Bearer " + localStorage.getItem("token"),
      };
    }

    document.addEventListener("DOMContentLoaded", async function () {
      if (!localStorage.getItem("token")) {
        window.location.href = "login.html";
        return;
      }

      try {
        const res = await fetch(API_BASE + "/orders", { headers: authHeaders() });
        const list = await res.json();
        document.getElementById("loading").classList.add("hidden");

        if (!res.ok) {
          document.getElementById("empty").classList.remove("hidden");
          document.getElementById("empty").querySelector("p").textContent =
            list.message || "Unable to load orders.";
          return;
        }

        if (!list.length) {
          document.getElementById("empty").classList.remove("hidden");
          return;
        }

        document.getElementById("tableWrap").classList.remove("hidden");
        const tbody = document.getElementById("orderRows");
        list.forEach(function (o) {
          const tr = document.createElement("tr");
          tr.className = "hover:bg-slate-50";
          const dateStr = o.created_at
            ? new Date(o.created_at.replace(" ", "T")).toLocaleString("en-US")
            : "—";
          tr.innerHTML =
            '<td class="px-4 py-3">' +
            '<a href="order-detail.html?id=' +
            o.id +
            '" class="font-bold text-orange-600 hover:underline">#' +
            o.id +
            "</a></td>" +
            '<td class="px-4 py-3 text-slate-600">' +
            dateStr +
            "</td>" +
            '<td class="px-4 py-3">' +
            (o.status || "—") +
            "</td>" +
            '<td class="px-4 py-3 text-right font-semibold">$' +
            Number(o.total).toFixed(2) +
            "</td>";
          tbody.appendChild(tr);
        });
      } catch (e) {
        document.getElementById("loading").classList.add("hidden");
        document.getElementById("empty").classList.remove("hidden");
      }
    });
  </script>
</body>
</html>
