<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Đăng nhập — PLAYARENA</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
body{
font-family:'Spline Sans',sans-serif;
min-height:100vh;
background-color:#0b0f19;
}
@keyframes float{
0%,100%{transform:translateY(0) rotate(0deg);}
50%{transform:translateY(-20px) rotate(5deg);}
}
.lego-char{
animation:float 6s ease-in-out infinite;
pointer-events:none;
}
.char-2{animation-delay:-2s;}
.char-3{animation-delay:-4s;}
.strength-fill{transition: width 0.25s ease, background-color 0.25s ease;}
</style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 relative text-white">

<img src="https://www.lego.com/cdn/cs/set/assets/blt56e18f8303e83921/75363.png"
class="lego-char absolute top-10 left-10 w-32 opacity-20 hidden lg:block" alt="">

<img src="https://www.lego.com/cdn/cs/set/assets/blta6b772421398860c/75362.png"
class="lego-char char-2 absolute bottom-10 left-20 w-40 opacity-30 hidden lg:block" alt="">

<img src="https://www.lego.com/cdn/cs/set/assets/blt0a8972d057a7593c/75364.png"
class="lego-char char-3 absolute top-20 right-10 w-36 opacity-25 hidden lg:block" alt="">

<div class="max-w-md w-full bg-white/10 backdrop-blur-sm rounded-3xl shadow-xl overflow-hidden border border-slate-700 z-10">

<div class="p-8 md:p-10">

<div class="flex flex-col items-center mb-8">

<div class="bg-orange-500 w-14 h-14 rounded-2xl flex items-center justify-center mb-4">
<span class="text-white font-black text-2xl">B</span>
</div>

<h2 class="text-2xl font-black tracking-tighter text-white">
PLAYARENA
</h2>

<p class="text-slate-400 text-sm mt-1">
Đăng nhập hoặc tạo tài khoản mới
</p>

</div>

<!-- Đăng nhập -->
<form id="loginForm" class="space-y-4 login-view">

<div class="space-y-2">
<label class="text-sm font-bold text-slate-300 ml-1" for="email">Email</label>
<input
id="email"
type="email"
autocomplete="username"
placeholder="name@example.com"
class="w-full bg-slate-800 border border-slate-700 rounded-2xl py-3.5 px-5 text-white placeholder-slate-500 focus:ring-2 focus:ring-orange-500/50 focus:border-orange-500 outline-none transition"
/>
</div>

<div class="space-y-2">
<label class="text-sm font-bold text-slate-300 ml-1" for="password">Mật khẩu</label>
<input
id="password"
type="password"
autocomplete="current-password"
placeholder="••••••••"
class="w-full bg-slate-800 border border-slate-700 rounded-2xl py-3.5 px-5 text-white placeholder-slate-500 focus:ring-2 focus:ring-orange-500/50 focus:border-orange-500 outline-none transition"
/>
<p id="loginPasswordError" class="text-sm text-red-400 min-h-[1.25rem] hidden pl-1" role="alert"></p>
</div>

<button
type="submit"
class="w-full bg-orange-500 hover:bg-orange-600 text-white font-black py-4 rounded-2xl mt-2 transition-colors"
>
ĐĂNG NHẬP
</button>

</form>

<!-- Đăng ký -->
<form id="registerForm" class="space-y-4 register-view hidden">

<div class="space-y-2">
<label class="text-sm font-bold text-slate-300 ml-1" for="regEmail">Email</label>
<input
id="regEmail"
type="email"
autocomplete="email"
placeholder="name@example.com"
class="w-full bg-slate-800 border border-slate-700 rounded-2xl py-3.5 px-5 text-white placeholder-slate-500 focus:ring-2 focus:ring-orange-500/50 focus:border-orange-500 outline-none transition"
/>
</div>

<div class="space-y-2">
<label class="text-sm font-bold text-slate-300 ml-1" for="regPassword">Mật khẩu</label>
<input
id="regPassword"
type="password"
autocomplete="new-password"
placeholder="Tạo mật khẩu"
class="w-full bg-slate-800 border border-slate-700 rounded-2xl py-3.5 px-5 text-white placeholder-slate-500 focus:ring-2 focus:ring-orange-500/50 focus:border-orange-500 outline-none transition"
/>
<!-- Thanh độ mật khẩu -->
<div class="mt-2 space-y-1.5">
<div class="h-2 rounded-full bg-slate-700/80 overflow-hidden">
<div id="strengthFill" class="strength-fill h-full w-0 rounded-full bg-slate-600"></div>
</div>
<p id="strengthLabel" class="text-xs font-semibold text-slate-500 pl-0.5">Nhập mật khẩu để xem độ mạnh</p>
</div>
</div>

<div class="space-y-2">
<label class="text-sm font-bold text-slate-300 ml-1" for="regPassword2">Nhập lại mật khẩu</label>
<input
id="regPassword2"
type="password"
autocomplete="new-password"
placeholder="Nhập lại mật khẩu"
class="w-full bg-slate-800 border border-slate-700 rounded-2xl py-3.5 px-5 text-white placeholder-slate-500 focus:ring-2 focus:ring-orange-500/50 focus:border-orange-500 outline-none transition"
/>
<p id="registerError" class="text-sm text-red-400 min-h-[1.25rem] hidden pl-1" role="alert"></p>
</div>

<button
type="submit"
class="w-full bg-orange-500 hover:bg-orange-600 text-white font-black py-4 rounded-2xl mt-1 transition-colors"
>
ĐĂNG KÝ
</button>

</form>

<div class="mt-8 text-center border-t border-slate-700 pt-6">

<p class="text-sm text-slate-400 toggle-login register-view hidden">
Đã có tài khoản?
<button type="button" id="showLoginBtn" class="text-orange-400 font-black hover:underline ml-1">Đăng nhập</button>
</p>

<p class="text-sm text-slate-400 toggle-register login-view">
Chưa có tài khoản?
<button type="button" id="showRegisterBtn" class="text-orange-400 font-black hover:underline ml-1">Đăng ký</button>
</p>

</div>

</div>
</div>

<script>
const API_BASE = "http://localhost:3000";

const loginForm = document.getElementById("loginForm");
const registerForm = document.getElementById("registerForm");
const loginPasswordError = document.getElementById("loginPasswordError");
const registerError = document.getElementById("registerError");
const strengthFill = document.getElementById("strengthFill");
const strengthLabel = document.getElementById("strengthLabel");

function showLoginView() {
  loginForm.classList.remove("hidden");
  registerForm.classList.add("hidden");
  document.querySelectorAll(".login-view").forEach(function (el) { el.classList.remove("hidden"); });
  document.querySelectorAll(".register-view").forEach(function (el) { el.classList.add("hidden"); });
  clearLoginError();
  registerError.classList.add("hidden");
  registerError.textContent = "";
}

function showRegisterView() {
  loginForm.classList.add("hidden");
  registerForm.classList.remove("hidden");
  document.querySelectorAll(".login-view").forEach(function (el) { el.classList.add("hidden"); });
  document.querySelectorAll(".register-view").forEach(function (el) { el.classList.remove("hidden"); });
  clearLoginError();
  registerError.classList.add("hidden");
  registerError.textContent = "";
}

document.getElementById("showRegisterBtn").addEventListener("click", showRegisterView);
document.getElementById("showLoginBtn").addEventListener("click", showLoginView);

function clearLoginError() {
  loginPasswordError.textContent = "";
  loginPasswordError.classList.add("hidden");
}

function showLoginError(msg) {
  loginPasswordError.textContent = msg;
  loginPasswordError.classList.remove("hidden");
}

/** Thanh độ mật khẩu — tone cam PLAYARENA + amber/red */
function getPasswordStrength(pw) {
  if (!pw) {
    return { percent: 0, label: "Nhập mật khẩu để xem độ mạnh", barClass: "bg-slate-600" };
  }
  let score = 0;
  if (pw.length >= 6) score++;
  if (pw.length >= 10) score++;
  if (/[a-z]/.test(pw) && /[A-Z]/.test(pw)) score++;
  if (/\d/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;

  if (score <= 2) {
    return {
      percent: 33,
      label: "Mật khẩu yếu — thêm chữ hoa, số hoặc ký tự đặc biệt",
      barClass: "bg-red-500",
    };
  }
  if (score <= 4) {
    return {
      percent: 66,
      label: "Mật khẩu trung bình — có thể dài hơn để an toàn hơn",
      barClass: "bg-amber-400",
    };
  }
  return {
    percent: 100,
    label: "Mật khẩu mạnh",
    barClass: "bg-orange-500",
  };
}

document.getElementById("regPassword").addEventListener("input", function () {
  const s = getPasswordStrength(this.value);
  strengthFill.style.width = s.percent + "%";
  strengthFill.className = "strength-fill h-full rounded-full " + s.barClass;
  strengthLabel.textContent = s.label;
  if (this.value.length === 0) {
    strengthLabel.classList.remove("text-orange-400", "text-amber-400", "text-red-400");
    strengthLabel.classList.add("text-slate-500");
  } else if (s.percent <= 33) {
    strengthLabel.className = "text-xs font-semibold pl-0.5 text-red-400";
  } else if (s.percent <= 66) {
    strengthLabel.className = "text-xs font-semibold pl-0.5 text-amber-400";
  } else {
    strengthLabel.className = "text-xs font-semibold pl-0.5 text-orange-400";
  }
});

loginForm.addEventListener("submit", async function (e) {
  e.preventDefault();
  clearLoginError();

  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");
  const email = emailInput.value.trim();
  const password = passwordInput.value;

  if (!email || !password) {
    showLoginError("Vui lòng nhập email và mật khẩu.");
    return;
  }

  try {
    const res = await fetch(API_BASE + "/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password }),
    });

    const data = await res.json();

    if (!res.ok) {
      if (data.message === "Wrong password") {
        showLoginError("Mật khẩu không đúng.");
      } else if (data.message === "User not found") {
        showLoginError("Email chưa được đăng ký.");
      } else {
        showLoginError(data.message || "Đăng nhập thất bại.");
      }
      return;
    }

    if (data.token) {
      localStorage.setItem("token", data.token);
      localStorage.setItem("role", data.role);
      localStorage.setItem("userEmail", email);

      if (data.role === "admin") {
        window.location.href = "admin.html";
      } else {
        window.location.href = "index.html";
      }
    } else {
      showLoginError(data.message || "Đăng nhập thất bại.");
    }
  } catch (err) {
    showLoginError("Không kết nối được máy chủ. Hãy chạy backend (port 3000).");
  }
});

registerForm.addEventListener("submit", async function (e) {
  e.preventDefault();
  registerError.classList.add("hidden");
  registerError.textContent = "";

  const email = document.getElementById("regEmail").value.trim();
  const password = document.getElementById("regPassword").value;
  const password2 = document.getElementById("regPassword2").value;

  if (!email || !password) {
    registerError.textContent = "Vui lòng nhập email và mật khẩu.";
    registerError.classList.remove("hidden");
    return;
  }

  if (password !== password2) {
    registerError.textContent = "Hai lần nhập mật khẩu không khớp.";
    registerError.classList.remove("hidden");
    return;
  }

  try {
    const res = await fetch(API_BASE + "/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password }),
    });

    const data = await res.json();

    if (!res.ok) {
      registerError.textContent =
        data.message === "User already exists"
          ? "Email này đã được đăng ký."
          : data.message || "Đăng ký thất bại.";
      registerError.classList.remove("hidden");
      return;
    }

    alert(data.message || "Tạo tài khoản thành công. Bạn có thể đăng nhập.");
    showLoginView();
    document.getElementById("email").value = email;
    document.getElementById("password").value = "";
  } catch (err) {
    registerError.textContent = "Không kết nối được máy chủ.";
    registerError.classList.remove("hidden");
  }
});
</script>

</body>
</html>
